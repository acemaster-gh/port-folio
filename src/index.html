<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>port-folio</title>
  <link rel="stylesheet" href="../dist/css/style.css"/>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col">

  <header class="bg-slate-800 border-b border-slate-700 sticky top-0 z-10">
    <nav class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <h1 class="text-xl font-bold text-indigo-400">port-folio</h1>
      <ul class="flex gap-6 text-sm text-slate-400">
        <li><a href="#" class="hover:text-white transition-colors">Home</a></li>
        <li><a href="#" class="hover:text-white transition-colors">About</a></li>
      </ul>
    </nav>
  </header>

  <main class="flex-1 max-w-5xl mx-auto w-full px-6 py-16">
    <section class="text-center space-y-6 py-12">
      <h2 class="text-4xl font-bold tracking-tight">Hello from port-folio</h2>
      <p class="text-slate-400 text-lg max-w-xl mx-auto">
        Tailwind CSS v4 · built with gocode v2.0.0
      </p>
      <div class="flex gap-4 justify-center flex-wrap">
        <button class="btn btn-primary" id="js-btn">Get Started</button>
        <button class="btn btn-outline">Learn More</button>
      </div>
    </section>

    <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
      <div class="card">
        <h3 class="text-lg font-bold mb-2">⚡ Fast</h3>
        <p class="text-slate-400 text-sm">Utility-first CSS. No runtime overhead.</p>
      </div>
      <div class="card">
        <h3 class="text-lg font-bold mb-2">🎨 Beautiful</h3>
        <p class="text-slate-400 text-sm">Dark-mode ready. Clean design system.</p>
      </div>
      <div class="card">
        <h3 class="text-lg font-bold mb-2">♻ Reusable</h3>
        <p class="text-slate-400 text-sm">Component classes via @layer.</p>
      </div>
    </section>
  </main>

  <footer class="bg-slate-800 border-t border-slate-700 px-6 py-4">
    <p class="text-center text-slate-500 text-sm">Built with gocode v2.0.0 ⚡</p>
  </footer>

  <script src="js/main.js" type="module"></script>
</body>
</html>
